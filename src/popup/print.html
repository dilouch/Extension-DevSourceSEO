<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Capture pleine page</title>
<style>
    body { margin:0; background:#fff; font-family: system-ui, sans-serif; }
    .toolbar { position:sticky; top:0; background:#12272b; color:#fff; padding:10px 16px; display:flex; gap:10px; align-items:center; z-index:10; box-shadow:0 2px 6px rgba(0,0,0,.2); flex-wrap:wrap; }
    .toolbar button { background:#f1fd0d; color:#12272b; border:none; padding:8px 16px; font-weight:700; border-radius:6px; cursor:pointer; font-size:13px; }
    .toolbar button:hover { opacity:.85; }
    .toolbar .info { font-size:12px; opacity:.85; flex-basis:100%; }
    img { display:block; width:100%; height:auto; }
    .placeholder { padding:40px; text-align:center; color:#666; }
    @media print {
        .toolbar { display:none !important; }
        @page { size:auto; margin:0; }
        body { margin:0; }
    }
</style>
</head>
<body>
<div class="toolbar">
    <button id="btn-print">🖨️ Imprimer / Enregistrer en PDF</button>
    <span class="info">Astuce : dans la boîte d'impression, choisis « Enregistrer au format PDF » comme destination.</span>
</div>
<div id="container" class="placeholder">Chargement de la capture…</div>
<script src="print.js"></script>
</body>
</html>
